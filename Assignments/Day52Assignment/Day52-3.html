<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ClearDebt Loan Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h2>ClearDebt Loan Calculator</h2>

    <div class="input-box">
      <label>Loan Amount (P):</label>
      <input type="number" id="amount" placeholder="e.g. 50000" />
    </div>
    <div class="input-box">
      <label>Annual Interest (%):</label>
      <input type="number" id="rate" step="0.01" placeholder="e.g. 8.5" />
    </div>
    <div class="input-box">
      <label>Tenure (Months):</label>
      <input type="number" id="months" placeholder="e.g. 12" />
    </div>

    <button onclick="generateSchedule()">Calculate EMI Schedule</button>

    <table class="table table-striped">
      <thead>
        <tr>
          <th>SNO</th>
          <th>Loan Left</th>
          <th>EMI</th>
          <th>Principal</th>
          <th>Interest</th>
          <th>Remaining Balance</th>
        </tr>
      </thead>
      <tbody id="scheduleBody"></tbody>
    </table>

    <script>
      function generateSchedule() {
        const P = parseFloat(document.getElementById("amount").value);
        const annualRate = parseFloat(document.getElementById("rate").value);
        const n = parseInt(document.getElementById("months").value);
        const tableBody = document.getElementById("scheduleBody");

        tableBody.innerHTML = "";

        if (isNaN(P) || isNaN(annualRate) || isNaN(n)) {
          alert("Please enter valid numbers");
          return;
        }

        const r = annualRate / 12 / 100;
        const top = Math.pow(1 + r, n);
        const bottom = top - 1;
        const emi = P * r * (top / bottom);

        let currentBalance = P;

        for (let i = 1; i <= n; i++) {
          let interest = currentBalance * r;
          let principal = emi - interest;
          let remainingBalance = currentBalance - principal;

          if (remainingBalance < 0) remainingBalance = 0;

          let row = `<tr>
            <td>${i}</td>
            <td>${currentBalance.toFixed(2)}</td>
            <td>${emi.toFixed(2)}</td>
            <td>${principal.toFixed(2)}</td>
            <td>${interest.toFixed(2)}</td>
            <td>${remainingBalance.toFixed(2)}</td>
        </tr>`;

          tableBody.innerHTML += row;
          currentBalance = remainingBalance;
        }
      }
    </script>
  </body>
</html>
